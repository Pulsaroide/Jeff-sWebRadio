name: Build JeffsWebRadio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure and install platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.7

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Cardputer"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"
          git clone --depth=1 https://github.com/schreibfaul1/ESP32-audioI2S.git \
            ~/Arduino/libraries/ESP32-audioI2S

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:PartitionScheme=huge_app \
            --output-dir ./build \
            JeffsWebRadio/JeffsWebRadio.ino

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeffsWebRadio-v2.2
          path: build/*.bin
