name: Build JeffsWebRadio
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 platform
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Cardputer"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"

      - name: Install ESP8266Audio
        run: |
          mkdir -p ~/Arduino/libraries
          git clone --depth=1 https://github.com/earlephilhower/ESP8266Audio.git ~/Arduino/libraries/ESP8266Audio

      - name: Find sketch
        run: |
          SKETCH=$(find . -maxdepth 1 -name "*.ino" | head -1)
          echo "SKETCH=$SKETCH" >> $GITHUB_ENV
          echo "Found: $SKETCH"

      - name: Compile firmware
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:PartitionScheme=huge_app \
            --output-dir ./build \
            ${{ env.SKETCH }}

      - name: Prepare artifact
        run: |
          find ./build -name "*.bin" ! -name "*.partitions.bin" ! -name "*bootloader*" | head -1 | xargs -I{} cp {} ./build/JeffsWebRadio-v1.3.bin
          ls ./build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeffsWebRadio-firmware
          path: ./build/JeffsWebRadio-v1.3.bin
          retention-days: 30
